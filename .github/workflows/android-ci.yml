name: Android CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:

jobs:

  unit-tests:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create Gradle Properties
        run: |
          mkdir -p ~/.gradle

          cat > ~/.gradle/gradle.properties <<EOF
          AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN_STAGING }}
          AUTH0_CLIENT_ID=${{ secrets.AUTH0_CLIENT_ID_STAGING }}
          AUTH0_SCHEME=com.loresuelvo.consumer
          EOF

      - name: Run Unit Tests
        run: make test

  acceptance-tests:

    needs: unit-tests

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create Gradle Properties
        run: |
          mkdir -p ~/.gradle

          cat > ~/.gradle/gradle.properties <<EOF
          AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN_STAGING }}
          AUTH0_CLIENT_ID=${{ secrets.AUTH0_CLIENT_ID_STAGING }}
          AUTH0_SCHEME=com.loresuelvo.consumer
          EOF

      - name: Run Acceptance Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: Nexus 6

          script: |
            make e2e