name: CI Build & Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build y Verificar
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Ejecutar Lint y Unit Tests
        env:
          AUTH0_DOMAIN_STAGING: ${{ secrets.AUTH0_DOMAIN_STAGING }}
          AUTH0_CLIENT_ID_STAGING: ${{ secrets.AUTH0_CLIENT_ID_STAGING }}
          AUTH0_AUDIENCE_STAGING: ${{ secrets.AUTH0_AUDIENCE_STAGING }}
          API_URL_STAGING: ${{ secrets.API_URL_STAGING }}
          AUTH0_SCHEME_STAGING: "com.loresuelvo.consumer.staging" 
        run: |
          make lint FLAVOR=Staging
          make test FLAVOR=Staging

      - name: Habilitar KVM (requerido por el emulador)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Ejecutar E2E (Android Instrumented Tests)
        uses: ReactiveCircus/android-emulator-runner@v2
        env:
          AUTH0_DOMAIN_STAGING: ${{ secrets.AUTH0_DOMAIN_STAGING }}
          AUTH0_CLIENT_ID_STAGING: ${{ secrets.AUTH0_CLIENT_ID_STAGING }}
          AUTH0_AUDIENCE_STAGING: ${{ secrets.AUTH0_AUDIENCE_STAGING }}
          API_URL_STAGING: ${{ secrets.API_URL_STAGING }}
          AUTH0_SCHEME_STAGING: "com.loresuelvo.consumer.staging" 
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          script: make e2e FLAVOR=Staging

      - name: Build APK Staging (verificación)
        env:
          AUTH0_DOMAIN_STAGING: ${{ secrets.AUTH0_DOMAIN_STAGING }}
          AUTH0_CLIENT_ID_STAGING: ${{ secrets.AUTH0_CLIENT_ID_STAGING }}
          AUTH0_AUDIENCE_STAGING: ${{ secrets.AUTH0_AUDIENCE_STAGING }}
          API_URL_STAGING: ${{ secrets.API_URL_STAGING }}
          AUTH0_SCHEME_STAGING: "com.loresuelvo.consumer.staging" 
        run: make build FLAVOR=Staging
